name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Weekly run (Mondays 06:00 UTC) so newly-published advisories are caught
    # even without new commits.
    - cron: '0 6 * * 1'

# Least-privilege by default; jobs opt into more if needed.
permissions:
  contents: read

# Cancel superseded runs for the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@stable # TODO: pin to SHA (rolling branch)
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@stable # TODO: pin to SHA (rolling branch)
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Run clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@stable # TODO: pin to SHA (rolling branch)
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Run tests
        run: cargo test --all-features --locked --verbose

  build:
    name: Build Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@stable # TODO: pin to SHA (rolling branch)
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Build release binary
        run: cargo build --release --locked --verbose
      - name: Check binary size
        run: |
          size=$(stat -c%s target/release/picoflow)
          echo "Binary size: $size bytes"
          if [ $size -gt 10485760 ]; then
            echo "ERROR: Binary size exceeds 10MB limit"
            exit 1
          fi
      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: picoflow-linux-x86_64
          path: target/release/picoflow
          retention-days: 7

  # release.yml uploads binaries in one job and downloads them in another, but that
  # pairing is never exercised outside a tagged release. Prove here that artifacts
  # written by upload-artifact are readable by download-artifact, so a major bump of
  # either action can't silently break releases.
  artifact-roundtrip:
    name: Artifact Roundtrip
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download the binary uploaded by the build job
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: picoflow-linux-x86_64
          path: downloaded
      - name: Verify the round-tripped binary runs
        run: |
          chmod +x downloaded/picoflow
          downloaded/picoflow --version

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@stable # TODO: pin to SHA (rolling branch)
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run security audit
        run: cargo audit

  cargo-deny:
    name: Supply-chain (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          command: check advisories bans licenses sources

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@stable # TODO: pin to SHA (rolling branch)
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin --locked
      - name: Generate coverage
        run: cargo tarpaulin --out Xml --all-features --locked
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./cobertura.xml
          fail_ci_if_error: false

  smoke:
    name: Smoke Test (CLI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@stable # TODO: pin to SHA (rolling branch)
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # Debug build is enough to exercise CLI behaviour and is much faster than the
      # LTO release build; the smoke script drives this binary end-to-end.
      - name: Build debug binary
        run: cargo build --locked
      - name: Run CLI smoke test
        run: SKIP_BUILD=1 PICOFLOW_BIN=target/debug/picoflow ./scripts/smoke-test.sh
