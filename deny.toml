# cargo-deny configuration for PicoFlow supply-chain hardening.
# Docs: https://embarkstudios.github.io/cargo-deny/
# Targeted at cargo-deny 0.18+ (default behavior: anything not explicitly
# allowed is denied). Run locally with: cargo deny check

[graph]
# Check all targets we actually ship binaries for.
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
    { triple = "armv7-unknown-linux-gnueabihf" },
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-apple-darwin" },
]

[advisories]
# RustSec advisory database.
db-urls = ["https://github.com/rustsec/advisory-db"]
# Fail on yanked crates so we never ship a pulled dependency.
yanked = "deny"
# Advisories consciously accepted (with justification). Keep this list short and revisit
# on every dependency bump.
ignore = [
    # rustls-pemfile 1.x is flagged "unmaintained" (not a vulnerability). It is pulled in
    # transitively by reqwest 0.11's rustls stack; there is no drop-in replacement without
    # upgrading reqwest to 0.12. Tracked for the reqwest 0.12 migration.
    "RUSTSEC-2025-0134",
]

[licenses]
# Explicit allow-list covering every license present in the dependency tree.
# Any crate whose license is not satisfiable by this list fails the check.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "Unicode-3.0",
    "Unlicense",
    # Zlib: permissive, OSI-approved, no copyleft obligations.
    # Pulled in transitively by foldhash (hashbrown -> hashlink -> rusqlite).
    "Zlib",
]
confidence-threshold = 0.8
# Per-crate license exceptions would go here if a crate needed a license
# outside the global allow-list above.
exceptions = []

[bans]
# Surface duplicate crate versions without hard-failing CI: the current
# tree legitimately carries several (bitflags 1/2, syn 1/2, windows-sys, ...).
multiple-versions = "warn"
# Wildcard ("*") version requirements are a supply-chain risk in first-party
# manifests; workspace crates are exempted automatically.
wildcards = "deny"
allow-wildcard-paths = true

[sources]
# Only allow crates from the official crates.io registry.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
